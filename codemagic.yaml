workflows:
  default-workflow:
    name: Build APK Métodos Numéricos
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Inicializar entorno Flutter y crear carpetas Android
        script: |
          mkdir -p lib
          mv main.dart lib/main.dart
          flutter create . --overwrite --offline
      - name: Conseguir dependencias de Flutter
        script: |
          flutter pub get
      - name: Construir el archivo APK de Android
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
